  var old=layer._tileZoom;layer._tileZoom=z;
  for(var dx=-1;dx<=1;dx++)for(var dy=-2;dy<=2;dy++){
    var xx=((x0+dx)%n+n)%n,yy=y0+dy;
    if(yy<0||yy>=n)continue;
    try{
      var u=layer.getTileUrl({x:xx,y:yy});
      if(!PF[u]){PF[u]=1;var im=new Image();im.crossOrigin='anonymous';im.src=u;}
    }catch(e){}
  }
  layer._tileZoom=old;
}
function prefetchLeg(g){
  if(!g)return;
  for(var i=0;i<=40;i++){
    var t=i/40,pos=legPos(g,ease(t));
    prefetchAt(pos[0],pos[1],legZoom(g,t));
  }
}
// Warm every city's tiles in the background once the overview is on screen, so the
// trip animation starts from a primed cache. Staggered to avoid a request flood.
var warmed=false;
function warmTrip(){
  if(warmed||!TL.trip)return;warmed=true;
  var z=Math.round(tlMap.getZoom());
  TL.trip.forEach(function(p,i){
    setTimeout(function(){
      prefetchAt(p.lat,wl(p.lng),z);          // overview zoom
      prefetchAt(p.lat,wl(p.lng),CITY_Z);     // arrival zoom
    }, 400+i*350);
  });
}

function stopAnim(){
  anim.playing=false;cancelAnimationFrame(anim.raf);
  ca.playing=false;cancelAnimationFrame(ca.raf);
}
function clearLayers(){
  stopAnim();
  layers.forEach(function(l){tlMap.removeLayer(l);});layers=[];
  if(vehicle){tlMap.removeLayer(vehicle);vehicle=null;}
  if(routeLine){tlMap.removeLayer(routeLine);routeLine=null;}
  ca.begun=false;ca.done=false;ca.markers=[];ca.lines=[];ca.label=null;ca.segs=[];ca.stops=[];
}
function info(html){document.getElementById('tl-info').innerHTML=html;}
function paintScrub(s){
  var p=s.value/10;
  s.style.background='linear-gradient(to right,#C03828 '+p+'%,#DDD0B8 '+p+'%) center/100% 4px no-repeat';
}
function prog(x){
  if(scrubbing)return;
  var s=document.getElementById('tl-scrub');
  if(!s)return;
  s.value=Math.round(Math.max(0,Math.min(1,x))*1000);
  paintScrub(s);
}
function btn(){
  var b=document.getElementById('tl-play');
  b.style.display='';
  var playing=mode==='trip'?anim.playing:ca.playing;
  var done=mode==='trip'?anim.done:ca.done;
  b.innerHTML=playing?'&#10074;&#10074; Pause':(done?'&#8635; Replay':'&#9654; Play');
}
function cityDot(ll,name,minor){
  var ic=L.divIcon({className:'',iconSize:null,iconAnchor:[6,6],
    html:'<div class="tl-citylab'+(minor?' minor':'')+'"><span class="cd"></span>'+name+'</div>'});
  var m=L.marker(ll,{icon:ic,interactive:false}).addTo(tlMap);
  layers.push(m);return m;
}
function vehIcon(m){return L.divIcon({className:'',iconSize:[42,42],iconAnchor:[21,21],
  html:'<div class="tl-veh">'+(MODEICO[m]||'')+'</div>'});}

// ---- Full-trip animated sequence ----
function tripOverview(){
  clearLayers();
  anim={leg:-1,t:0,playing:false,raf:0,last:0,phase:'idle',holdUntil:0,done:false};
  var b=[LAX];
  cityDot(LAX,'Los Angeles',false);
  TL.trip.forEach(function(p){
    var ll=[p.lat,wl(p.lng)];b.push(ll);
    cityDot(ll,p.name,false);
  });
  tlMap.fitBounds(b,{padding:[40,40]});
  info('<span class="tl-hint">Press play to fly the route, Los Angeles to Los Angeles.</span>');
  prog(0);
  warmTrip();
}
function sampleLeg(g,n){
  var a=[];
  for(var i=0;i<=n;i++)a.push(legPos(g,i/n));
  return a;
}
function tripBegin(){
  clearLayers();
  anim={leg:-1,t:0,playing:false,raf:0,last:0,phase:'hold',holdUntil:performance.now()+900,done:false};
  routeLine=L.polyline([],{color:'#C03828',weight:3,opacity:.85}).addTo(tlMap);
  vehicle=L.marker(LAX,{icon:vehIcon('plane'),zIndexOffset:1000,interactive:false}).addTo(tlMap);
  cityDot(LAX,'Los Angeles',false);
  tlMap.setView(LAX,CITY_Z,{animate:false});
  info('<b>Los Angeles</b> &middot; wheels up shortly');
  prefetchLeg(LEGS[0]);
}
function tripPlay(){
  if(anim.phase==='idle'||anim.done)tripBegin();
  anim.playing=true;anim.last=0;
  anim.raf=requestAnimationFrame(frame);
  btn();
}
function legCtrl(g){
  if(g.ctrl)return g.ctrl;
  if(!g.bow)return null;
  var a=g.frm,b=g.to;
  return [(a[0]+b[0])/2-(b[1]-a[1])*g.bow,(a[1]+b[1])/2+(b[0]-a[0])*g.bow];
}
function legPos(g,t){
  var a=g.frm,b=g.to,c=legCtrl(g);
  if(!c)return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t];
  var u=1-t;
  return [u*u*a[0]+2*u*t*c[0]+t*t*b[0],u*u*a[1]+2*u*t*c[1]+t*t*b[1]];
}
function legZoom(g,t){
  var k=t<.25?sm(t/.25):t>.75?sm((1-t)/.25):1;
  return CITY_Z+(g.cruise-CITY_Z)*k;
}
function frame(ts){
  if(!anim.playing)return;
  if(!anim.last)anim.last=ts;
  var dt=Math.min(80,ts-anim.last);anim.last=ts;
  if(anim.phase==='hold'){
    if(ts>=anim.holdUntil)nextLeg();
  }else if(anim.phase==='leg'){
    var g=LEGS[anim.leg];
    anim.t=Math.min(1,anim.t+dt/g.dur);
    var pos=legPos(g,ease(anim.t));
    vehicle.setLatLng(pos);
    routeLine.addLatLng(pos);
    tlMap.setView(pos,legZoom(g,anim.t),{animate:false});
    prog((anim.leg+anim.t)/LEGS.length);
    if(anim.t>=1)arrive(g);
  }
  if(anim.playing)anim.raf=requestAnimationFrame(frame);
}
function nextLeg(){
  anim.leg++;
  if(anim.leg>=LEGS.length){finish();return;}
  var g=LEGS[anim.leg];
  anim.t=0;anim.phase='leg';
  vehicle.setIcon(vehIcon(g.mode));
  info(g.a+' &rarr; '+g.b+' &middot; '+g.label);
  prefetchLeg(g);
}
function arrive(g){
  if(g.arrive){
    cityDot(g.to,g.arrive.name,g.arrive.minor);
    if(!g.arrive.minor){
      var zh=g.arrive.zh?' <span class="tl-zh">'+g.arrive.zh+'</span>':'';
      var dt=g.arrive.dates?' &middot; '+g.arrive.dates:'';
      info('<b>'+g.arrive.name+'</b>'+zh+dt);
    }
  }
  anim.phase='hold';
  anim.holdUntil=performance.now()+((g.arrive&&!g.arrive.minor)?1200:250);
  prefetchLeg(LEGS[anim.leg+1]);
}
function finish(){
  stopAnim();anim.done=true;anim.phase='idle';prog(1);btn();
  if(vehicle){tlMap.removeLayer(vehicle);vehicle=null;}
  info('<b>Home.</b> Twenty-one days, eight cities, one honeymoon.');
  if(routeLine)tlMap.flyToBounds(routeLine.getBounds(),{padding:[40,40],duration:1.6});
}
function tripSeek(p){
  stopAnim();
  if(anim.phase==='idle'||!routeLine)tripBegin();
  anim.playing=false;anim.done=false;
  // rebuild city dots from scratch
  layers.forEach(function(l){tlMap.removeLayer(l);});layers=[];
  cityDot(LAX,'Los Angeles',false);
  if(p>=.999){
    var pts=[];
    for(var i=0;i<LEGS.length;i++){
      var gg=LEGS[i];pts=pts.concat(sampleLeg(gg,20));
      if(gg.arrive)cityDot(gg.to,gg.arrive.name,gg.arrive.minor);
    }
    routeLine.setLatLngs(pts);
    anim.leg=LEGS.length;anim.t=0;
    finish();
    return;
  }
  var n=LEGS.length,x=Math.max(0,p)*n,leg=Math.min(n-1,Math.floor(x)),t=x-leg;
  var pts=[];
  for(var i=0;i<leg;i++){
    var gg=LEGS[i];pts=pts.concat(sampleLeg(gg,20));
    if(gg.arrive)cityDot(gg.to,gg.arrive.name,gg.arrive.minor);
  }
  var g=LEGS[leg],et=ease(t),steps=Math.max(1,Math.floor(et*20));
  for(var j=0;j<=steps;j++)pts.push(legPos(g,et*j/steps));
  var pos=legPos(g,et);
  routeLine.setLatLngs(pts);
  if(!vehicle)vehicle=L.marker(pos,{icon:vehIcon(g.mode),zIndexOffset:1000,interactive:false}).addTo(tlMap);
  vehicle.setIcon(vehIcon(g.mode));vehicle.setLatLng(pos);
  tlMap.setView(pos,legZoom(g,t),{animate:false});
  anim.leg=leg;anim.t=t;anim.phase='leg';anim.last=0;
  info(g.a+' &rarr; '+g.b+' &middot; '+g.label);
  prefetchLeg(g);
  btn();
}

// ---- Per-city view: static render + animated playback ----
function shortDay(l){
  if(!l)return '';
  var i=l.indexOf('—');
  return (i>0?l.slice(0,i):l).trim();
}
function cityStopsOrdered(){
  var cd=TL.cities[mode];
  if(!cd)return [];
  var df=document.getElementById('tl-day').value;
  var byday={};
  cd.stops.forEach(function(s){(byday[s.day_idx]=byday[s.day_idx]||[]).push(s);});
  var S=[];
  Object.keys(byday).map(Number).sort(function(a,b){return a-b;}).forEach(function(di){
    if(df!==''&&+df!==di)return;
    byday[di].forEach(function(s,k){
      var first=(k===0);
      if(first&&S.length){
        var p=S[S.length-1];
        // consecutive days share the hotel anchor: merge so the route flows
        // out of the hotel instead of teleporting
        if(Math.abs(p.lat-s.lat)<2e-4&&Math.abs(p.lng-s.lng)<2e-4)return;
      }
      s._first=first;
      S.push(s);
    });
  });
  return S;
}
function stopIcon(s,dim){
  var svg=CATICO[s.cat]||'<span class="ndot"></span>';
  var bg=s.anchor?'#8E8578':s.color;
  return L.divIcon({className:'',iconSize:[24,24],iconAnchor:[12,12],
    html:'<div class="tl-stop-ico'+(s.anchor?' anchor':'')+(dim?' dim':'')+'" style="background:'+bg+'">'+svg+'</div>'});
}
function showCity(slugName){
  clearLayers();prog(0);
  anim={leg:-1,t:0,playing:false,raf:0,last:0,phase:'idle',holdUntil:0,done:false};
  var cd=TL.cities[slugName];
  if(!cd){info('');return;}
  var dayFilter=document.getElementById('tl-day').value;
  var byday={};
  cd.stops.forEach(function(s){(byday[s.day_idx]=byday[s.day_idx]||[]).push(s);});
  var all=[];
  Object.keys(byday).map(Number).sort(function(a,b){return a-b;}).forEach(function(di){
    if(dayFilter!==''&&+dayFilter!==di)return;
    var stops=byday[di],col=stops[0].color;
    var pts=stops.map(function(s){return [s.lat,s.lng];});
    all=all.concat(pts);
    if(pts.length>1)
      layers.push(L.polyline(pts,{color:col,weight:3.5,opacity:.85}).addTo(tlMap));
    var lbl=shortDay(cd.days[di]||'');
    if(lbl){
      var mi=Math.floor((pts.length-1)/2);
      var p1=pts[mi],p2=pts[mi+1]||pts[mi];
      var lp=pts.length>1?[(p1[0]+p2[0])/2,(p1[1]+p2[1])/2]:pts[0];
      var ic=L.divIcon({className:'',iconSize:null,iconAnchor:[0,24],
        html:'<div class="tl-daylab" style="border-color:'+col+';color:'+col+'">'+lbl+'</div>'});
      layers.push(L.marker(lp,{icon:ic,interactive:false}).addTo(tlMap));
    }
    stops.forEach(function(s){
      var m=L.marker([s.lat,s.lng],{icon:stopIcon(s,false)}).addTo(tlMap);
      var zh=(s.zh&&s.zh!=='—')?' <span class="tl-zh">'+s.zh+'</span>':'';
      m.bindPopup('<b>'+s.name+'</b>'+zh+'<br><span class="tl-pop-meta">'+(s.cat?s.cat+' &middot; ':'')+shortDay(s.day)+'</span>');
      layers.push(m);
    });
  });
  if(all.length>1)tlMap.fitBounds(all,{padding:[44,44]});
  else if(all.length===1)tlMap.setView(all[0],14);
  info('<b>'+cd.name+'</b> <span class="tl-zh">'+cd.zh+'</span> &middot; <span class="tl-hint">press play to walk the route, or tap any stop</span>');
}
function setDayFocus(di){
  ca.focusDay=di;
  ca.markers.forEach(function(m,i){
    var el=m.getElement();
    if(!el)return;
    var d=el.querySelector('.tl-stop-ico');
    if(!d)return;
    if(di==null||ca.stops[i].day_idx===di)d.classList.remove('dim');
    else d.classList.add('dim');
  });
  ca.lines.forEach(function(l){
    l.setStyle({opacity:(di==null||l._day===di)?.85:.13});
  });
}
function showStopLabel(s){
  hideStopLabel();
  var ic=L.divIcon({className:'',iconSize:null,iconAnchor:[0,38],
    html:'<div class="tl-stoplab" style="border-color:'+(s.anchor?'#8E8578':s.color)+'">'+s.name+'</div>'});
  ca.label=L.marker([s.lat,s.lng],{icon:ic,interactive:false,zIndexOffset:1200}).addTo(tlMap);
  layers.push(ca.label);
  var zh=(s.zh&&s.zh!=='—')?' <span class="tl-zh">'+s.zh+'</span>':'';
  info('<b>'+s.name+'</b>'+zh+(s.day?' &middot; '+shortDay(s.day):''));
}
function hideStopLabel(){
  if(ca.label){tlMap.removeLayer(ca.label);ca.label=null;}
}
// camera helpers: each segment gets a cruise zoom that fits both endpoints,
// so short hops stay close and long hauls (Dujiangyan, Wuzhizhou) pull out
function segCruise(sg){
  if(sg.cz==null)
    sg.cz=Math.min(STOP_Z,tlMap.getBoundsZoom(
      L.latLngBounds([[sg.a.lat,sg.a.lng],[sg.b.lat,sg.b.lng]]).pad(.4)));
  return sg.cz;
}
function segDur(sg){
  var span=STOP_Z-segCruise(sg);
  return Math.min(2400,(sg.draw?800:650)+190*span);
}
function segCam(sg,t){
  var k=sm(t);
  var pos=[sg.a.lat+(sg.b.lat-sg.a.lat)*k,sg.a.lng+(sg.b.lng-sg.a.lng)*k];
  var r=t<.3?sm(t/.3):t>.7?sm((1-t)/.3):1;
  tlMap.setView(pos,STOP_Z+(segCruise(sg)-STOP_Z)*r,{animate:false});
}
function prefetchSeg(sg){
  prefetchAt(sg.b.lat,sg.b.lng,STOP_Z);
  var cz=segCruise(sg);
  for(var i=1;i<8;i++){
    var k=i/8;
    prefetchAt(sg.a.lat+(sg.b.lat-sg.a.lat)*k,sg.a.lng+(sg.b.lng-sg.a.lng)*k,cz);
  }
}
function cityBegin(quiet){
  clearLayers();
  var S=cityStopsOrdered();
  ca={segs:[],stops:S,idx:0,t:0,playing:false,raf:0,last:0,phase:'linger',
      lingerUntil:0,done:false,markers:[],lines:[],label:null,begun:true,focusDay:null};
  if(!S.length){ca.done=true;return;}
  S.forEach(function(s){
    var m=L.marker([s.lat,s.lng],{icon:stopIcon(s,true)}).addTo(tlMap);
    layers.push(m);ca.markers.push(m);
  });
  for(var i=1;i<S.length;i++)
    ca.segs.push({a:S[i-1],b:S[i],draw:!S[i]._first,color:S[i].color,
                  day:S[i].day_idx,line:null,cz:null});
  if(!quiet){
    tlMap.setView([S[0].lat,S[0].lng],STOP_Z,{animate:false});
    prefetchAt(S[0].lat,S[0].lng,STOP_Z);
    if(ca.segs.length)prefetchSeg(ca.segs[0]);
    setDayFocus(S[0].day_idx);
    showStopLabel(S[0]);
    ca.lingerUntil=performance.now()+(S[0].anchor?800:1400);
  }
  prog(0);
}
function cityPlay(){
  if(!ca.begun||ca.done)cityBegin(false);
  if(ca.done){btn();return;}
  ca.playing=true;ca.last=0;
  ca.raf=requestAnimationFrame(cframe);
  btn();
}
function cframe(ts){
  if(!ca.playing)return;
  if(!ca.last)ca.last=ts;
  var dt=Math.min(80,ts-ca.last);ca.last=ts;
  if(ca.phase==='linger'){
    if(ts>=ca.lingerUntil){hideStopLabel();nextSeg();}
  }else if(ca.phase==='seg'){
    var sg=ca.segs[ca.idx];
    if(sg.draw&&!sg.line){
      sg.line=L.polyline([[sg.a.lat,sg.a.lng]],{color:sg.color,weight:3.5,opacity:.85}).addTo(tlMap);
      sg.line._day=sg.day;
      layers.push(sg.line);ca.lines.push(sg.line);
    }
    ca.t=Math.min(1,ca.t+dt/segDur(sg));
    if(sg.draw){
      var k=sm(ca.t);
      sg.line.setLatLngs([[sg.a.lat,sg.a.lng],
        [sg.a.lat+(sg.b.lat-sg.a.lat)*k,sg.a.lng+(sg.b.lng-sg.a.lng)*k]]);
    }
    segCam(sg,ca.t);
    if(ca.t>=1)arriveStop();
  }
  prog(cityProgress());
  if(ca.playing)ca.raf=requestAnimationFrame(cframe);
}
function nextSeg(){
  if(ca.idx>=ca.segs.length){cityFinish();return;}
  ca.t=0;ca.phase='seg';
  var sg=ca.segs[ca.idx];
  if(sg.day!==ca.focusDay)setDayFocus(sg.day);
  prefetchSeg(sg);
}
function arriveStop(){
  var sg=ca.segs[ca.idx];
  if(sg.draw&&sg.line)
    sg.line.setLatLngs([[sg.a.lat,sg.a.lng],[sg.b.lat,sg.b.lng]]);
  var s=ca.stops[ca.idx+1];
  showStopLabel(s);
  ca.idx++;
  ca.phase='linger';
  ca.lingerUntil=performance.now()+(s.anchor?800:1600);
}
function cityFinish(){
  ca.playing=false;ca.done=true;ca.phase='idle';
  hideStopLabel();
  setDayFocus(null);
  var cd=TL.cities[mode];
  var n=0;
  ca.stops.forEach(function(s){if(!s.anchor)n++;});
  if(cd)info('<b>'+cd.name+'</b> <span class="tl-zh">'+cd.zh+'</span> &middot; '+n+' stops walked');
  var pts=ca.stops.map(function(s){return [s.lat,s.lng];});
  if(pts.length>1)tlMap.flyToBounds(pts,{padding:[44,44],duration:1.2});
  prog(1);btn();
}
function cityProgress(){
  if(!ca.segs.length)return ca.done?1:0;
  return Math.min(1,(ca.idx+(ca.phase==='seg'?ca.t:0))/ca.segs.length);
}
function citySeek(p){
  stopAnim();
  if(!ca.begun)cityBegin(true);
  ca.playing=false;ca.done=false;
  hideStopLabel();
  var n=ca.segs.length;
  if(!n){prog(p);return;}
  var x=Math.max(0,Math.min(.9999,p))*n,idx=Math.floor(x),t=x-idx;
  ca.lines.forEach(function(l){tlMap.removeLayer(l);});
  ca.lines=[];
  ca.segs.forEach(function(sg){sg.line=null;});
  for(var i=0;i<idx;i++){
    var sg=ca.segs[i];
    if(!sg.draw)continue;
    sg.line=L.polyline([[sg.a.lat,sg.a.lng],[sg.b.lat,sg.b.lng]],
      {color:sg.color,weight:3.5,opacity:.85}).addTo(tlMap);
    sg.line._day=sg.day;
    layers.push(sg.line);ca.lines.push(sg.line);
  }
  var sg=ca.segs[idx];
  if(sg.draw&&t>0){
    var k=sm(t);
    sg.line=L.polyline([[sg.a.lat,sg.a.lng],
      [sg.a.lat+(sg.b.lat-sg.a.lat)*k,sg.a.lng+(sg.b.lng-sg.a.lng)*k]],
      {color:sg.color,weight:3.5,opacity:.85}).addTo(tlMap);
    sg.line._day=sg.day;
    layers.push(sg.line);ca.lines.push(sg.line);
  }
  ca.idx=idx;ca.t=t;ca.phase='seg';ca.last=0;
  setDayFocus(sg.day);
  segCam(sg,t);
  var s=ca.stops[idx];
  var zh=(s.zh&&s.zh!=='—')?' <span class="tl-zh">'+s.zh+'</span>':'';
  info('<b>'+s.name+'</b>'+zh+(s.day?' &middot; '+shortDay(s.day):''));
  btn();
}

function loadView(){
  var dw=document.querySelector('.tl-day-wrap'),ds=document.getElementById('tl-day');
  if(mode==='trip'){
    dw.style.display='none';
    tripOverview();
  }else{
    ds.innerHTML='<option value="">All days</option>';
    var cd=TL.cities[mode];
    if(cd)cd.days.forEach(function(d,i){
      var o=document.createElement('option');o.value=i;o.textContent=shortDay(d);ds.appendChild(o);
    });
    dw.style.display='';
    showCity(mode);
  }
  btn();
}
function tlToggle(){
  if(mode==='trip'){
    if(anim.playing){stopAnim();btn();}
    else tripPlay();
  }else{
    if(ca.playing){stopAnim();btn();}
    else cityPlay();
  }
}
function tlBoot(){
  tlInit();
  document.getElementById('tl-play').addEventListener('click',tlToggle);
  document.getElementById('tl-reset').addEventListener('click',function(){
    if(mode==='trip')tripOverview();else showCity(mode);
    btn();
  });
  document.getElementById('tl-view').addEventListener('change',function(){
    mode=this.value;
    document.getElementById('tl-day').value='';
    loadView();
  });
  document.getElementById('tl-day').addEventListener('change',function(){showCity(mode);});
  var sc=document.getElementById('tl-scrub');
  paintScrub(sc);
  sc.addEventListener('pointerdown',function(){scrubbing=true;});
  window.addEventListener('pointerup',function(){scrubbing=false;});
  sc.addEventListener('input',function(){
    paintScrub(this);
    var p=this.value/1000;
    if(mode==='trip')tripSeek(p);else citySeek(p);
  });
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',tlBoot);
else tlBoot();

</script>
